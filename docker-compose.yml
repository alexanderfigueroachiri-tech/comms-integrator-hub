services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cih_dev
    ports:
      - "5432:5432"
    volumes:
      - cih_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cih_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cih_pg_data:
